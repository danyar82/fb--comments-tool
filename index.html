<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تووڵی دەرهێنانی کۆمێنتەکانی فەیسبووک</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background effects -->
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    <div class="bg-glow glow-3"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                    </svg>
                </div>
                <div>
                    <h1 id="mainTitle">کۆمێنت دەرهێنەر</h1>
                    <p class="subtitle" id="mainSubtitle">کۆمێنتەکانی ڤیدیۆکانی فەیسبووک دەربهێنە</p>
                </div>
            </div>
            <button id="langToggle" style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; color: white; padding: 6px 12px; font-weight: bold; cursor: pointer; transition: 0.2s;">EN</button>
        </header>

        <!-- Step 1: Access Token -->
        <section class="card" id="tokenSection">
            <div class="card-header">
                <span class="step-badge">١</span>
                <h2>Access Token</h2>
            </div>
            <div class="card-body">
                <p class="info-text">
                    بۆ بەکارهێنانی ئەم تووڵە پێویستت بە <strong>Access Token</strong> ی فەیسبووکە.
                    <a href="https://developers.facebook.com/tools/explorer/" target="_blank" class="link">لێرە دروستی بکە ←</a>
                </p>
                <div class="input-group">
                    <label for="accessToken">Access Token</label>
                    <div class="input-wrapper">
                        <input type="password" id="accessToken" placeholder="Access Token لێرە دابنێ..." autocomplete="off">
                        <button class="btn-icon" id="toggleToken" title="نیشاندان/شاردنەوە">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button class="btn btn-primary" id="verifyToken">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                    پشتڕاستکردنەوەی تۆکن
                </button>
                <div id="tokenStatus" class="status-msg hidden"></div>
            </div>
        </section>

        <!-- Step 2: Page Selection -->
        <section class="card hidden" id="pageSection">
            <div class="card-header">
                <span class="step-badge">٢</span>
                <h2>هەڵبژاردنی پەیج</h2>
            </div>
            <div class="card-body">
                <div class="input-group">
                    <label for="pageSelect">پەیجەکەت هەڵبژێرە</label>
                    <select id="pageSelect">
                        <option value="">-- پەیجێک هەڵبژێرە --</option>
                    </select>
                </div>
                <div id="pageStatus" class="status-msg hidden"></div>
            </div>
        </section>

        <!-- Step 3: Video/Post URL -->
        <section class="card hidden" id="videoSection">
            <div class="card-header">
                <span class="step-badge">٣</span>
                <h2>ڤیدیۆکان</h2>
            </div>
            <div class="card-body">
                <div class="input-group">
                    <label for="videoUrl">لینک یان ID ی پۆست/ڤیدیۆ</label>
                    <div class="input-wrapper">
                        <input type="text" id="videoUrl" placeholder="لینکی ڤیدیۆ یان Post ID لێرە دابنێ..." dir="ltr">
                        <button class="btn-icon" id="addVideo" title="زیادکردن">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <div id="videoList" class="video-list"></div>

                <div class="btn-group">
                    <button class="btn btn-primary" id="fetchComments" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <polyline points="1 4 1 10 7 10"/>
                            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                        </svg>
                        دەرهێنانی کۆمێنتەکان
                    </button>
                    <button class="btn btn-secondary" id="fetchAllVideos">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>
                            <line x1="7" y1="2" x2="7" y2="22"/>
                            <line x1="17" y1="2" x2="17" y2="22"/>
                            <line x1="2" y1="12" x2="22" y2="12"/>
                            <line x1="2" y1="7" x2="7" y2="7"/>
                            <line x1="2" y1="17" x2="7" y2="17"/>
                            <line x1="17" y1="7" x2="22" y2="7"/>
                            <line x1="17" y1="17" x2="22" y2="17"/>
                        </svg>
                        هێنانی هەموو ڤیدیۆکانی پەیج
                    </button>
                </div>
            </div>
        </section>

        <!-- Progress -->
        <section class="card hidden" id="progressSection">
            <div class="card-header">
                <h2>پێشکەوتن</h2>
            </div>
            <div class="card-body">
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <p class="progress-text" id="progressText">٪٠ تەواو بوو</p>
                <div id="progressLog" class="progress-log"></div>
            </div>
        </section>

        <!-- Results per video -->
        <section class="card hidden" id="resultsSection">
            <div class="card-header">
                <h2>ئەنجامەکان</h2>
                <div class="header-actions">
                    <button class="btn btn-sm btn-primary" id="shareLink" style="margin-inline-start: 8px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                            <polyline points="16 6 12 2 8 6"></polyline>
                            <line x1="12" y1="2" x2="12" y2="15"></line>
                        </svg>
                        پێدانی لینک
                    </button>
                    <button class="btn btn-sm btn-secondary" id="exportCSV">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        CSV داگرتن
                    </button>
                    <button class="btn btn-sm btn-secondary" id="exportJSON">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        JSON داگرتن
                    </button>
                </div>
            </div>
            <div class="card-body">
                <!-- Tab bar for each video -->
                <div class="tabs" id="videoTabs"></div>
                
                <!-- Results table -->
                <div id="resultsContent"></div>
            </div>
        </section>

        <!-- Summary / Totals -->
        <section class="card hidden" id="summarySection">
            <div class="card-header">
                <h2>🏆 کۆی گشتی - ڕیزبەندی</h2>
            </div>
            <div class="card-body">
                <div id="summaryContent"></div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>دروستکراوە بۆ شیکاری کۆمێنتەکانی فەیسبووک &bull; ٢٠٢٦</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
