<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ڕیزبەندی کۆمێنتەکان | FB Comments Exporter</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans Arabic', 'Segoe UI', sans-serif;
      background: #0a0a1a;
      color: #e8e8f0;
      direction: rtl;
      --text-primary: #ffffff;
      --text-muted: #8888aa;
      --accent-blue: #4361ee;
      --gold: #ffd700;
      --silver: #c0c0c0;
      --bronze: #cd7f32;
      min-height: 100vh;
    }

    /* ===== Background Glows ===== */
    .bg-glow {
      position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.15; pointer-events: none; z-index: -1;
    }
    .glow-1 { width: 500px; height: 500px; background: #4361ee; top: -100px; right: -100px; }
    .glow-2 { width: 400px; height: 400px; background: #7209b7; bottom: -50px; left: -50px; }

    .app-container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    /* ===== Header ===== */
    .header {
      background: linear-gradient(135deg, #4361ee, #7209b7);
      padding: 24px 30px;
      border-radius: 16px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(67, 97, 238, 0.2);
      display: flex; align-items: center; gap: 16px;
    }
    .header-icon { font-size: 40px; }
    .header h1 { margin: 0 0 4px 0; font-size: 22px; color: #fff; }
    .header .subtitle { margin: 0; color: rgba(255,255,255,0.8); font-size: 13px; }

    /* ===== Loading ===== */
    .loading-container {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 80px 20px; text-align: center;
    }
    .spinner {
      width: 50px; height: 50px; border: 4px solid rgba(67,97,238,0.2);
      border-top-color: #4361ee; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 18px; color: var(--text-muted); }

    /* ===== Error ===== */
    .error-container {
      text-align: center; padding: 60px 20px;
      background: rgba(255,50,50,0.05); border: 1px solid rgba(255,50,50,0.2);
      border-radius: 16px; margin-top: 20px;
    }
    .error-icon { font-size: 60px; margin-bottom: 16px; }
    .error-title { font-size: 22px; font-weight: 700; color: #ff6b6b; margin-bottom: 8px; }
    .error-msg { color: var(--text-muted); font-size: 15px; }

    /* ===== Stats Row ===== */
    .stats-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .stat-card {
      background: rgba(67, 97, 238, 0.1); border: 1px solid rgba(67, 97, 238, 0.2);
      border-radius: 12px; padding: 16px 24px; flex: 1; min-width: 120px; text-align: center;
    }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--accent-blue); }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* ===== Result Cards ===== */
    .result-card {
      background: rgba(25, 25, 60, 0.6);
      border: 1px solid rgba(100, 100, 255, 0.1);
      border-radius: 16px; padding: 24px; margin-bottom: 24px;
    }
    .master-card { border-color: rgba(255, 215, 0, 0.3); box-shadow: 0 0 20px rgba(255, 215, 0, 0.05); }
    .card-header {
      display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 16px; flex-wrap: wrap;
    }
    .card-header h2 { margin: 0; font-size: 18px; flex: 1; }
    .stat-badge {
      background: rgba(67, 97, 238, 0.15); color: #8bb0ff;
      padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 600;
    }

    /* ===== Chart ===== */
    .chart-container {
      display: flex; align-items: flex-end; height: 250px;
      margin: 10px 0 30px; padding: 20px 10px 0; gap: 12px;
      border-bottom: 2px solid rgba(255,255,255,0.1); overflow-x: auto;
    }
    .chart-col {
      flex: 1; display: flex; flex-direction: column; justify-content: flex-end;
      align-items: center; gap: 6px; min-width: 40px; height: 100%;
    }
    .chart-bar-wrap { width: 100%; flex: 1; display: flex; align-items: flex-end; justify-content: center; }
    .chart-bar {
      width: 30px; background: linear-gradient(to top, var(--accent-blue), #7209b7);
      border-radius: 4px 4px 0 0; position: relative;
      animation: growUp 0.8s ease-out forwards;
    }
    .chart-count {
      font-size: 11px; font-weight: bold; color: #fff;
      position: absolute; top: -20px; width: 100%; text-align: center;
    }
    .chart-label {
      font-size: 10px; color: var(--text-muted); text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 55px;
    }
    @keyframes growUp { from { height: 0; } }

    /* ===== Leaderboard ===== */
    .leaderboard-list { display: flex; flex-direction: column; gap: 8px; }
    .lb-row {
      display: flex; align-items: center; gap: 12px;
      background: rgba(0,0,0,0.2); padding: 10px 16px; border-radius: 10px;
      transition: background 0.2s;
    }
    .lb-row:hover { background: rgba(67,97,238,0.1); }
    .lb-rank { font-size: 18px; font-weight: 700; width: 30px; text-align: center; }
    .gold { color: var(--gold); }
    .silver { color: var(--silver); }
    .bronze { color: var(--bronze); }
    .lb-name { flex: 1; font-weight: 600; }
    .lb-name a { color: var(--text-primary); text-decoration: none; }
    .lb-name a:hover { text-decoration: underline; color: var(--accent-blue); }
    .lb-count { font-size: 16px; font-weight: 700; color: var(--accent-blue); }

    /* ===== Files Grid ===== */
    .files-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px;
    }

    /* ===== Winner Banner ===== */
    .winner-banner {
      text-align: center; padding: 24px; margin-bottom: 20px;
      background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(168,85,247,0.1));
      border: 1px solid rgba(251,191,36,0.3); border-radius: 12px;
    }
    .winner-trophy { font-size: 3rem; margin-bottom: 8px; }
    .winner-name { font-size: 1.4rem; font-weight: 800; color: var(--gold); }
    .winner-count { font-size: 1rem; color: var(--text-muted); margin-top: 4px; }

    /* ===== Footer ===== */
    .footer {
      text-align: center; padding: 40px 20px 20px; color: var(--text-muted); font-size: 12px;
    }
    .footer a { color: var(--accent-blue); text-decoration: none; }

    /* ===== Buttons ===== */
    .btn {
      border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;
      font-family: inherit; font-weight: 600; font-size: 14px;
      transition: transform 0.2s, opacity 0.2s;
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent-blue); color: #fff;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-green { background: #00c853; }

    /* ===== Print ===== */
    @media print {
      body { background: #fff; color: #000; }
      .app-container { max-width: 100% !important; }
      .bg-glow, .footer, .btn, .no-print { display: none !important; }
      .header { background: none; box-shadow: none; border-bottom: 2px solid #ccc; color: #000; }
      .header h1, .subtitle { color: #000; }
      .result-card { background: transparent; border: 1px solid #ddd; box-shadow: none; page-break-inside: avoid; }
      .lb-row { background: #f9f9f9; border: 1px solid #eee; color: #000; }
      .gold, .silver, .bronze, .lb-count { color: #000 !important; }
      .lb-name a { color: #000 !important; }
      .chart-bar { background: #555 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .chart-count { color: #000; }
      @page { margin: 1cm; }
    }

    @media (max-width: 600px) {
      .files-grid { grid-template-columns: 1fr; }
      .stats-row { flex-direction: column; }
      .card-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div class="app-container">
    <header class="header">
      <div class="header-icon">📊</div>
      <div style="flex:1">
        <h1 id="mainTitle">ڕیزبەندی کۆمێنتەکان</h1>
        <p class="subtitle" id="mainSubtitle">ئەنجامی شیکاری کۆمێنتەکانی فەیسبووک — <strong>FB Comments Exporter</strong></p>
      </div>
      <button id="langToggle" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);border-radius:8px;color:#fff;padding:6px 12px;font-weight:bold;cursor:pointer;transition:0.2s;">EN</button>
    </header>

    <main id="mainContent">
      <div class="loading-container" id="loadingState">
        <div class="spinner"></div>
        <div class="loading-text">...خەریکی هێنانی داتا</div>
      </div>
    </main>

    <footer class="footer">
      دروستکراوە لەلایەن <a href="#">FB Comments Exporter</a> — ٢٠٢٦
    </footer>
  </div>

  <script src="lz-string.min.js"></script>
  <script>
  (function() {
    'use strict';

    // ===== i18n =====
    let currentLang = localStorage.getItem('fbceLang') || 'ku';
    const i18n = {
      "ku": {
        langBtn: "EN", dir: "rtl",
        mainTitle: "ڕیزبەندی کۆمێنتەکان",
        mainSubtitle: 'ئەنجامی شیکاری کۆمێنتەکانی فەیسبووک — <strong>FB Comments Exporter</strong>',
        loading: "...خەریکی هێنانی داتا",
        errorTitle: "نەتوانرا داتا بهێنرێت",
        noData: "هیچ داتایەک نییە",
        unknown: "(نەناسراو)",
        comments: "کۆمێنت",
        copied: "کۆپی کرا! ✔",
        settingsSaved: "ڕێکخستنەکان خەزن کران",
        showMore: "زیاتر (Show More)",
        files: "فایل",
        totalComments: "کۆی کۆمێنتەکان",
        totalPeople: "ژمارەی کەسەکان",
        totalVideos: "ژمارەی ڤیدیۆ",
        masterTitle: "🏆 ڕیزبەندی گشتی (لە تەواوی فایلەکاندا)",
        leaderboardTitle: "🏆 ڕیزبەندی گشتی",
        winnerText: "بە {COUNT} کۆمێنت براوەیە!",
        savePdf: "🖨️ خەزنکردن وەک PDF",
        noLink: "هیچ لینکی شەیرکراوێک نەدۆزرایەوە. تکایە دڵنیابە لینکەکە تەواوە.",
        brokenLink: "لینکەکە بەسەرچوو یان سڕاوەتەوە",
        fetchError: "هەڵە لە هێنانی داتا: ",
        badData: "داتای ناو لینکەکە تێکچوو",
        unknownFormat: "فۆرماتی داتا ناناسرێت",
        reshare: "فۆرماتی داتا ناناسرێت. تکایە دووبارە شەیر بکەرەوە.",
        footer: 'دروستکراوە لەلایەن <a href="#">FB Comments Exporter</a> — ٢٠٢٦'
      },
      "en": {
        langBtn: "KU", dir: "ltr",
        mainTitle: "Comments Leaderboard",
        mainSubtitle: 'Facebook comment analysis results — <strong>FB Comments Exporter</strong>',
        loading: "Loading data...",
        errorTitle: "Could not load data",
        noData: "No data available",
        unknown: "(Unknown)",
        copied: "Copied! ✔",
        settingsSaved: "Settings saved successfully",
        showMore: "Show More",
        comments: "Comments",
        files: "Files",
        totalComments: "Total Comments",
        totalPeople: "Total People",
        totalVideos: "Total Videos",
        masterTitle: "🏆 Global Leaderboard (Across All Files)",
        leaderboardTitle: "🏆 Overall Leaderboard",
        winnerText: "Winner with {COUNT} comments!",
        savePdf: "🖨️ Save as PDF",
        noLink: "No shared link found. Please make sure the link is complete.",
        brokenLink: "Link is broken or data has been deleted",
        fetchError: "Error fetching data: ",
        badData: "Data in the link is corrupted",
        unknownFormat: "Unrecognized data format",
        reshare: "Unrecognized data format. Please re-share.",
        footer: 'Built by <a href="#">FB Comments Exporter</a> — 2026'
      }
    };
    function t(key) { return i18n[currentLang][key] || key; }

    function applyLang() {
      document.documentElement.dir = i18n[currentLang].dir;
      document.body.dir = i18n[currentLang].dir;
      document.body.style.direction = i18n[currentLang].dir;
      document.documentElement.setAttribute('dir', i18n[currentLang].dir);
      const langBtn = document.getElementById('langToggle');
      if (langBtn) langBtn.textContent = i18n[currentLang].langBtn;
      document.getElementById('mainTitle').textContent = t('mainTitle');
      document.getElementById('mainSubtitle').innerHTML = t('mainSubtitle');
      const loadingText = document.querySelector('.loading-text');
      if (loadingText) loadingText.textContent = t('loading');
      const footer = document.querySelector('.footer');
      if (footer) footer.innerHTML = t('footer');
      
      // If we are showing an error/no-link message, re-render it
      if (window._currentErrorKey) {
          showError(t(window._currentErrorKey));
      } else if (window._currentErrorRaw) {
          showError(window._currentErrorRaw);
      }
    }

    applyLang();
    document.getElementById('langToggle')?.addEventListener('click', () => {
      currentLang = currentLang === 'ku' ? 'en' : 'ku';
      localStorage.setItem('fbceLang', currentLang);
      applyLang();
      // Re-render if data already loaded
      if (window._viewerData) detectAndRender(window._viewerData);
    });

    const mainContent = document.getElementById('mainContent');

    function showError(msg, key) {
      if (key) window._currentErrorKey = key;
      else window._currentErrorRaw = msg;
      
      mainContent.innerHTML = `
        <div class="error-container">
          <div class="error-icon">😕</div>
          <div class="error-title">${t('errorTitle')}</div>
          <div class="error-msg">${msg}</div>
        </div>`;
    }

    function generateRowsHTML(sortedData) {
      if (!sortedData || sortedData.length === 0)
        return `<p style="text-align:center;padding:15px;color:var(--text-muted)">${t('noData')}</p>`;

      const medals = ["🥇", "🥈", "🥉"];
      const rankClasses = ["gold", "silver", "bronze"];

      return sortedData.map((w, i) => {
        const rank = i < 3 ? medals[i] : `${i + 1}`;
        const rankClass = i < 3 ? rankClasses[i] : "";
        const name = w.name || t('unknown');
        const url = w.url || '#';
        return `
          <div class="lb-row">
            <span class="lb-rank ${rankClass}">${rank}</span>
            <span class="lb-name"><a href="${url}" target="_blank">${name}</a></span>
            <span class="lb-count">${w.count}</span>
          </div>`;
      }).join("");
    }

    function renderChart(sortedData) {
      if (!sortedData || sortedData.length === 0) return '';
      const maxCount = sortedData[0].count;
      return `<div class="chart-container">${sortedData.map((item, index) => {
        const heightPercent = Math.max((item.count / maxCount) * 100, 5);
        const name = item.name || t('unknown');
        return `
          <div class="chart-col">
            <div class="chart-bar-wrap">
              <div class="chart-bar" style="height:${heightPercent}%; animation-delay:${index * 0.05}s;" title="${name}: ${item.count}">
                <span class="chart-count">${item.count}</span>
              </div>
            </div>
            <span class="chart-label" title="${name}">${name}</span>
          </div>`;
      }).join("")}</div>`;
    }

    function renderFileCard(name, total, sortedData) {
      const safeName = name.length > 30 ? name.substring(0, 27) + "..." : name;
      return `
        <section class="result-card">
          <div class="card-header">
            <h2 title="${name}">📄 ${safeName}</h2>
            <div class="stat-badge">${total} ${t('comments')}</div>
          </div>
          <div class="leaderboard-list">${generateRowsHTML(sortedData)}</div>
        </section>`;
    }

    // ===== Render Analyzer-style data (from analyzer.js) =====
    function renderAnalyzerData(data) {
      let html = '';
      const top10 = data.m.slice(0, 10);
      const hasMore = data.m.length > 10;

      // Master card
      html += `<section class="result-card master-card">
        <div class="card-header no-print">
          <h2>${t('masterTitle')}</h2>
          <div class="stat-badge"><span>${(data.t || 0).toLocaleString('en-US')}</span> ${t('comments')}</div>
          <div class="stat-badge"><span>${data.n || 0}</span> ${t('files')}</div>
          <div style="flex:1;"></div>
          <button class="btn no-print" onclick="window.print()">${t('savePdf')}</button>
        </div>
        ${renderChart(top10)}
        <div class="leaderboard-list" id="masterList">${generateRowsHTML(top10)}</div>
        ${hasMore ? `<button class="btn no-print" style="width:100%; margin-top:15px; background:rgba(255,255,255,0.05);" id="showMoreMaster">👇 ${t('showMore')}</button>` : ''}
      </section>`;

      // Individual file cards
      if (data.f && data.f.length > 0) {
        html += '<section class="files-grid">';
        data.f.forEach(f => {
          html += renderFileCard(f.name, f.total || 0, (f.sorted || []).slice(0, 10));
        });
        html += '</section>';
      }

      mainContent.innerHTML = html;

      // Add listener
      if (hasMore) {
          document.getElementById('showMoreMaster').onclick = (e) => {
              document.getElementById('masterList').innerHTML = generateRowsHTML(data.m);
              e.target.remove();
          };
      }
    }

    // ===== Render App-style data (from app.js) =====
    function renderAppData(data) {
      const totals = data.totals || {};
      const sorted = Object.entries(totals)
        .map(([id, val]) => ({ id, name: val.name, count: val.count }))
        .sort((a, b) => b.count - a.count);

      const top10 = sorted.slice(0, 10);
      const hasMore = sorted.length > 10;
      const totalComments = sorted.reduce((s, v) => s + v.count, 0);
      let html = '';

      // Stats
      html += `<div class="stats-row">
        <div class="stat-card">
          <div class="stat-value">${totalComments.toLocaleString('en-US')}</div>
          <div class="stat-label">${t('totalComments')}</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${sorted.length}</div>
          <div class="stat-label">${t('totalPeople')}</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${data.tv || 0}</div>
          <div class="stat-label">${t('totalVideos')}</div>
        </div>
      </div>`;

      // Winner
      if (sorted.length > 0) {
        html += `<div class="winner-banner">
          <div class="winner-trophy">🏆</div>
          <div class="winner-name">${sorted[0].name}</div>
          <div class="winner-count">${t('winnerText').replace('{COUNT}', sorted[0].count)}</div>
        </div>`;
      }

      // Chart (top 15)
      const chartData = sorted.slice(0, 15);
      html += renderChart(chartData);

      // Full leaderboard
      html += `<section class="result-card master-card">
        <div class="card-header">
          <h2>${t('leaderboardTitle')}</h2>
          <div class="stat-badge">${totalComments.toLocaleString('en-US')} ${t('comments')}</div>
          <div style="flex:1;"></div>
          <button class="btn no-print" onclick="window.print()">${t('savePdf')}</button>
        </div>
        <div class="leaderboard-list">${generateRowsHTML(sorted.map(s => ({
          name: s.name, count: s.count,
          url: s.id ? 'https://facebook.com/' + s.id : '#'
        })))}</div>
      </section>`;

      mainContent.innerHTML = html;
    }

    // ===== Load data =====
    async function loadData() {
      const params = new URLSearchParams(window.location.search);
      const sharedId = params.get('shared');
      const sbId = params.get('sb');
      const b64 = params.get('d');

      // 1. Check if data is already injected (Standalone HTML)
      if (window._viewerData) {
          detectAndRender(window._viewerData);
          return;
      }

      if (b64) {
        try {
          const safeB64 = b64.replace(/ /g, '+');
          const jsonStr = decodeURIComponent(escape(atob(safeB64)));
          const data = JSON.parse(jsonStr);
          window._viewerData = data;
          detectAndRender(data);
        } catch (e) {
          showError(t('badData'));
        }
        return;
      }

      if (sbId) {
          // Supabase load
          try {
              const settings = JSON.parse(localStorage.getItem('fbce_settings') || '{}');
              const sbUrl = settings.sbUrl || 'https://qnmwdsigshpsshhdtkls.supabase.co';
              const sbKey = settings.sbKey || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFubXdkc2lnc2hwc3NoaGR0a2xzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNjkyNjEsImV4cCI6MjA4OTc0NTI2MX0.7WAtA0Gzk1pIfOirzO1ahiFmDuJRsXJdZ1jsV4Z4P6w';

              if (!sbUrl || !sbKey) {
                  showError("سەبەمەیتی سەبا بەیس چالاک نەکراوە بۆ ئەوەی ئەم لینکە کرابێتەوە. (Supabase not configured)");
                  return;
              }
              const res = await fetch(`${sbUrl}/rest/v1/shares?id=eq.${sbId}&select=data`, {
                  headers: {
                      'apikey': sbKey,
                      'Authorization': `Bearer ${sbKey}`
                  }
              });
              if (!res.ok) throw new Error('Supabase Error: ' + res.status);
              const resData = await res.json();
              if (resData[0]?.data) {
                  window._viewerData = resData[0].data;
                  detectAndRender(window._viewerData);
              } else {
                  throw new Error('Data not found');
              }
          } catch(e) {
              showError(t('fetchError') + e.message);
          }
          return;
      }

      if (!sharedId) {
        // No ID, just show landing info or instructions
        showError(t('noLink'));
        return;
      }

      try {
        let data;
        let res = await fetch('https://api.npoint.io/' + sharedId);
        
        if (res.ok) {
          data = await res.json();
        } else {
          // Fallback to jsonblob for older links
          res = await fetch('https://jsonblob.com/api/jsonBlob/' + sharedId);
          if (!res.ok) throw new Error(t('brokenLink'));
          data = await res.json();
        }
        
        window._viewerData = data;
        detectAndRender(data);
      } catch (e) {
        showError(t('fetchError') + e.message);
      }
    }

    function detectAndRender(data) {
      if (data.m && Array.isArray(data.m)) {
        renderAnalyzerData(data);
      } else if (data.totals) {
        renderAppData(data);
      } else if (data.parsedFiles) {
        showError(t('reshare'));
      } else {
        showError(t('unknownFormat'));
      }
    }

    loadData();
  })();
  </script>
</body>
</html>
